@if (loading) {
  <div class="loading">
    <mat-spinner diameter="48"></mat-spinner>
  </div>
} @else {
  <div class="page-header">
    <h1>Accounts</h1>
    <button mat-flat-button (click)="addAccount()">
      <mat-icon>add</mat-icon> New Account
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <table mat-table [dataSource]="accounts" class="accounts-table">
        <ng-container matColumnDef="icon">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let a">
            <mat-icon>{{ getAccountIcon(a.type) }}</mat-icon>
          </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Account Name</th>
          <td mat-cell *matCellDef="let a">{{ a.name }}</td>
        </ng-container>

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef>Type</th>
          <td mat-cell *matCellDef="let a">
            <mat-chip>{{ a.type | titlecase }}</mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="accountNumber">
          <th mat-header-cell *matHeaderCellDef>Account Number</th>
          <td mat-cell *matCellDef="let a">{{ a.accountNumber }}</td>
        </ng-container>

        <ng-container matColumnDef="balance">
          <th mat-header-cell *matHeaderCellDef>Balance</th>
          <td mat-cell *matCellDef="let a" [class.negative]="a.balance < 0">
            {{ a.balance | currency }}
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let a">
            <button mat-icon-button (click)="editAccount(a, $event)" matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteAccount(a, $event)" matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="clickable-row" (click)="viewAccount(row)"></tr>
      </table>
    </mat-card-content>
  </mat-card>
}
