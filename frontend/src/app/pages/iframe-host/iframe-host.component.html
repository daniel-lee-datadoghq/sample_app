<h1>Iframe Demo</h1>

<mat-card class="info-card">
  <mat-card-content>
    <mat-icon>info</mat-icon>
    <p>
      This page embeds an internal Angular route
      (<code>/embedded/account-summary</code>) inside an iframe.
      The embedded content uses a minimal layout without the sidebar navigation.
    </p>
  </mat-card-content>
</mat-card>

<mat-card class="iframe-card">
  <mat-card-header>
    <mat-card-title>Embedded Account Summary</mat-card-title>
    <mat-card-subtitle>Loaded via iframe from {{ iframeUrl }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <iframe [src]="iframeUrl | safeUrl" class="embedded-iframe" title="Embedded Account Summary"></iframe>
  </mat-card-content>
</mat-card>
